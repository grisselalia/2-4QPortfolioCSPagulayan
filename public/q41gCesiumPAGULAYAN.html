<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Rating</title>
    <link rel="icon" href="" type="image/png">
    <style>
        body 
        {
            font-family: Arial;
            background:#f4f4f4;
        }

        .container 
        {
            width:300px;
            margin:40px auto;
            background:white;
            padding:20px;
            border-radius:8px;
        }
 
        input, select 
        {
            width:100%;
            margin-bottom:10px;
            padding:6px;
        }

        button
        {
            width:100%;
            padding:8px;
            background:#3b6eea;
            color:white;
            border:none;
            cursor:pointer;
        }

        .star 
        {
            font-size:22px;
            cursor:pointer;
            color:#ccc;
        }

        .star.active
        {
            color:gold;
        }

        .gold-stars
        {
            color:gold;
        }

        li
        {
            background:#eee;
            margin-top:8px;
            padding:6px;
            border-radius:4px;
        }
    </style>
    </head>
    <body>

<div class="container">

    <h2>Add a Movie</h2>

    <label>Title:</label>
        <input type="text" id="title">

    <label>Year:</label>
        <input type="number" id="year">

    <label>Genre:</label>
        <select id="genre">
        <option>Action</option>
        <option>Comedy</option>
        <option>Drama</option>
        <option>Romance</option>
        <option>Horror</option>
        </select>

    <label>Rating:</label>

<div>
<span class="star" data-value="1">★</span>
<span class="star" data-value="2">★</span>
<span class="star" data-value="3">★</span>
<span class="star" data-value="4">★</span>
<span class="star" data-value="5">★</span>
</div>

<br>
<button id="addMovie">Add Movie</button>

<h3>Movie List</h3>
<ul id="movieList"></ul>

</div>

<script>
    const stars = document.querySelectorAll(".star");
let rating = 0;

stars.forEach(star => {
    star.addEventListener("click", function(){

        rating = this.dataset.value;

        stars.forEach(s => s.classList.remove("active"));

        for(let i=0;i<rating;i++){
            stars[i].classList.add("active");
        }

    });
});

document.getElementById("addMovie").addEventListener("click", function(){

    const title = document.getElementById("title").value;
    const year = document.getElementById("year").value;
    const genre = document.getElementById("genre").value;

    const movie = {
        title: title,
        year: year,
        genre: genre,
        rating: rating
    };

    let movies = JSON.parse(localStorage.getItem("movies")) || [];

    movies.push(movie);

    localStorage.setItem("movies", JSON.stringify(movies));

    displayMovies();

});

function displayMovies(){

    const movieList = document.getElementById("movieList");
    movieList.innerHTML = "";

    const movies = JSON.parse(localStorage.getItem("movies")) || [];

    movies.forEach(movie => {

        const li = document.createElement("li");

        let stars = "★".repeat(movie.rating) + "☆".repeat(5 - movie.rating);

        li.innerHTML = `${movie.title} (${movie.year}) - ${movie.genre}, Rating: <span class="gold-stars">${stars}</span>`;

        movieList.appendChild(li);

    });

}

displayMovies();
</script>
    </body>
</html>
